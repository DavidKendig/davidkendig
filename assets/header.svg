<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" role="img" aria-label="David Kendig — Build it simple. Ship it fast. Keep it yours.">
  <defs>
    <linearGradient id="blobGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A66C2" />
      <stop offset="55%" stop-color="#1E88E5" />
      <stop offset="100%" stop-color="#00C2A8" />
    </linearGradient>
    <linearGradient id="blobGradSoft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A66C2" />
      <stop offset="100%" stop-color="#7C4DFF" />
    </linearGradient>
    <filter id="soften" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <!-- back blob: slow counter-pulse for depth -->
  <g filter="url(#soften)" opacity="0.45">
    <path fill="url(#blobGradSoft)">
      <animate attributeName="d" dur="9s" repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="
          M450,10 C543.9,10 620,86.1 620,180 C620,273.9 543.9,350 450,350 C356.1,350 280,273.9 280,180 C280,86.1 356.1,10 450,10 Z;
          M450,5 C546.6,5 625,83.4 625,180 C625,276.6 546.6,355 450,355 C353.4,355 275,276.6 275,180 C275,83.4 353.4,5 450,5 Z;
          M450,10 C543.9,10 620,86.1 620,180 C620,273.9 543.9,350 450,350 C356.1,350 280,273.9 280,180 C280,86.1 356.1,10 450,10 Z" />
    </path>
  </g>

  <!-- front blob: the pulse behind the name -->
  <g>
    <animateTransform attributeName="transform" type="scale" additive="sum"
      dur="6s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="1;1.035;1" />
    <animateTransform attributeName="transform" type="translate" additive="sum"
      dur="6s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="0 0;-15.75 -6.3;0 0" />
    <path fill="url(#blobGrad)" opacity="0.92">
      <animate attributeName="d" dur="7s" repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.33;0.66;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        values="
          M450,25 C535.6,25 605,94.4 605,180 C605,265.6 535.6,335 450,335 C364.4,335 295,265.6 295,180 C295,94.4 364.4,25 450,25 Z;
          M450,30 C538,30 610,97 610,180 C610,263 538,330 450,330 C362,330 290,263 290,180 C290,97 362,30 450,30 Z;
          M450,20 C530,20 600,90 604,176 C608,262 538,340 450,340 C362,340 292,262 296,176 C300,90 370,20 450,20 Z;
          M450,25 C535.6,25 605,94.4 605,180 C605,265.6 535.6,335 450,335 C364.4,335 295,265.6 295,180 C295,94.4 364.4,25 450,25 Z" />
    </path>
  </g>

  <!-- name + tagline: static so text never wobbles -->
  <g text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
    <text x="450" y="182" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="1">David Kendig</text>
    <text x="450" y="218" font-size="15" font-weight="500" fill="#ffffff" opacity="0.9">Build it simple. Ship it fast.</text>
    <text x="450" y="240" font-size="15" font-weight="500" fill="#ffffff" opacity="0.9">Keep it yours.</text>
  </g>
</svg>
